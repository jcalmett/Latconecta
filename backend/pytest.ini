[pytest]
# Configuración de pytest para Bitel API

# Archivos y directorios a buscar
testpaths = tests

# Patrón de nombres de archivos de test
python_files = test_*.py

# Patrón de nombres de clases de test
python_classes = Test*

# Patrón de nombres de funciones de test
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Markers personalizados
markers =
    auth: Tests de autenticación
    public: Tests de endpoints públicos
    protected: Tests de endpoints protegidos
    admin: Tests que requieren permisos de admin
    slow: Tests que toman más tiempo

# Filtros de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
